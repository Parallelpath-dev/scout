name: Scout Synthesize Only

on:
  workflow_dispatch:
    inputs:
      client_slug:
        description: 'Client slug to synthesize (leave blank for all)'
        required: false
        default: ''

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

jobs:
  synthesize:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Get active clients
        id: get-clients
        run: |
          python -c "
          import os, json
          from supabase import create_client
          sb = create_client(os.environ['SUPABASE_URL'], os.environ['SUPABASE_SERVICE_KEY'])
          result = sb.table('clients').select('slug').execute()
          slugs = [r['slug'] for r in result.data]
          print('clients=' + json.dumps(slugs))
          " >> $GITHUB_OUTPUT

      - name: Run Claude synthesizer
        run: |
          INPUT_SLUG="${{ github.event.inputs.client_slug }}"
          if [ -n "$INPUT_SLUG" ]; then
            python synthesizers/synthesizer.py "$INPUT_SLUG"
          else
            echo '${{ steps.get-clients.outputs.clients }}' | python -c "
          import sys, json, subprocess
          clients = json.load(sys.stdin)
          for slug in clients:
              subprocess.run(['python', 'synthesizers/synthesizer.py', slug], check=False)
            "
          fi

      - name: Send email digest
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SCOUT_DIGEST_RECIPIENTS: ${{ secrets.SCOUT_DIGEST_RECIPIENTS }}
          SCOUT_FROM_EMAIL: ${{ secrets.SCOUT_FROM_EMAIL }}
        run: |
          INPUT_SLUG="${{ github.event.inputs.client_slug }}"
          if [ -n "$INPUT_SLUG" ]; then
            python builders/email_digest.py "$INPUT_SLUG"
          else
            echo '${{ steps.get-clients.outputs.clients }}' | python -c "
          import sys, json, subprocess
          clients = json.load(sys.stdin)
          for slug in clients:
              subprocess.run(['python', 'builders/email_digest.py', slug], check=False)
            "
          fi
